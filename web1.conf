# HTTPS 配置（443端口，保持你原来的证书配置）
server {
    listen 443 ssl;
    server_name zhongdang.net;

    # 你的SSL证书配置（保留不变）
    ssl_certificate zhongdang.net_bundle.crt;
    ssl_certificate_key zhongdang.net.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 1. 后端接口代理：/api/ 开头的请求转发到3000端口
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. 前端静态页面：根路径/ 指向你的web目录
    location / {
        root /home/ubuntu/web;
        index index.html;
        try_files $uri $uri/ /index.html; # 适配Vue路由的history模式
    }
}

# 额外配置：把HTTP（80端口）请求自动跳转到HTTPS
server {
    listen 80;
    server_name zhongdang.net;
    return 301 https://$host$request_uri;
}